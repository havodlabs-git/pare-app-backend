name: Deploy — Google Cloud Run

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Build e Deploy para Cloud Run
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do código
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # 2. Autenticar com Google Cloud
      - name: Autenticar com Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 3. Configurar o SDK do Google Cloud
      - name: Configurar gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: pare-app-483321

      # 4. Configurar Docker para usar o Container Registry do GCP
      - name: Configurar Docker para GCR
        run: gcloud auth configure-docker --quiet

      # 5. Build e push da imagem Docker
      - name: Build e Push da imagem Docker
        run: |
          IMAGE="gcr.io/pare-app-483321/pare-app-backend:${{ github.sha }}"
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      # 6. Deploy para Cloud Run
      - name: Deploy para Cloud Run
        run: |
          gcloud run deploy pare-app-backend \
            --image $IMAGE \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --max-instances 10 \
            --set-env-vars "NODE_ENV=production,JWT_EXPIRES_IN=7d,RATE_LIMIT_WINDOW_MS=900000,RATE_LIMIT_MAX_REQUESTS=100" \
            --set-secrets "MONGODB_URI=MONGODB_URI:latest,JWT_SECRET=JWT_SECRET:latest,CORS_ORIGIN=CORS_ORIGIN:latest,ADMIN_EMAIL=ADMIN_EMAIL:latest,ADMIN_PASSWORD=ADMIN_PASSWORD:latest"

      # 7. Mostrar a URL do serviço
      - name: URL do serviço
        run: |
          gcloud run services describe pare-app-backend \
            --region us-central1 \
            --format 'value(status.url)'
